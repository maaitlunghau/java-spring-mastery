<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit User Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 font-sans text-gray-900">

    <div class="flex h-screen overflow-hidden">
        <div class="w-64 bg-gray-900 text-white flex flex-col">
            <div class="h-16 flex items-center px-6 border-b border-gray-800">
                <span class="text-lg font-bold tracking-wider text-indigo-400">MST SOFTWARE</span>
            </div>
            <nav class="flex-1 px-4 py-6 space-y-1">
                <a href="#"
                    class="flex items-center px-4 py-2.5 text-sm font-medium text-gray-400 hover:bg-gray-800 hover:text-white rounded-lg transition-colors">
                    Dashboard
                </a>
                <a href="#" class="flex items-center px-4 py-2.5 text-sm font-medium bg-gray-800 text-white rounded-lg">
                    Users System
                </a>
            </nav>
        </div>

        <div class="flex-1 flex flex-col overflow-y-auto">
            <main class="p-8 max-w-2xl w-full mx-auto">
                <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-8">
                    <div class="mb-6">
                        <h2 class="text-lg font-semibold text-gray-900">Edit User Blueprint</h2>
                        <p class="text-sm text-gray-500">Modify existing state properties inside core database records
                            mapping.</p>
                    </div>

                    <form method="POST" th:object="${user}" th:action="@{/users/update/{id}(id=*{id})}"
                        class="space-y-5">
                        <input type="hidden" th:field="*{id}" />

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">User Name Definition</label>
                            <input type="text" th:field="*{name}"
                                th:classappend="${#fields.hasErrors('name')} ? 'border-red-500 focus:ring-red-500/20 focus:border-red-500' : 'border-gray-300 focus:ring-indigo-500/20 focus:border-indigo-500'"
                                class="w-full px-4 py-2.5 border rounded-lg focus:outline-none text-sm">
                            <p class="text-xs text-red-500 mt-1" th:if="${#fields.hasErrors('name')}"
                                th:errors="*{name}"></p>
                        </div>

                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1.5">Modify Email Structural
                                    Mapping</label>
                                <input type="email" th:field="*{email}"
                                    th:classappend="${#fields.hasErrors('email')} ? 'border-red-500 focus:ring-red-500/20 focus:border-red-500' : 'border-gray-300 focus:ring-indigo-500/20 focus:border-indigo-500'"
                                    class="w-full px-4 py-2.5 border rounded-lg focus:outline-none text-sm">
                                <p class="text-xs text-red-500 mt-1" th:if="${#fields.hasErrors('email')}"
                                    th:errors="*{email}"></p>
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1.5">Update Password
                                    Key</label>
                                <input type="password" th:field="*{password}" placeholder="Leave blank to keep current"
                                    th:classappend="${#fields.hasErrors('password')} ? 'border-red-500 focus:ring-red-500/20 focus:border-red-500' : 'border-gray-300 focus:ring-indigo-500/20 focus:border-indigo-500'"
                                    class="w-full px-4 py-2.5 border rounded-lg focus:outline-none text-sm">
                                <p class="text-xs text-red-500 mt-1" th:if="${#fields.hasErrors('password')}"
                                    th:errors="*{password}"></p>
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">Update Address
                                Inventory</label>
                            <input type="text" th:field="*{address}"
                                th:classappend="${#fields.hasErrors('address')} ? 'border-red-500 focus:ring-red-500/20 focus:border-red-500' : 'border-gray-300 focus:ring-indigo-500/20 focus:border-indigo-500'"
                                class="w-full px-4 py-2.5 border rounded-lg focus:outline-none text-sm">
                            <p class="text-xs text-red-500 mt-1" th:if="${#fields.hasErrors('address')}"
                                th:errors="*{address}"></p>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">Update Security Authority
                                Role</label>
                            <div class="relative">
                                <select th:field="*{role}"
                                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 text-sm appearance-none cursor-pointer">
                                    <option value="USER">USER</option>
                                    <option value="ADMIN">ADMIN</option>
                                </select>
                                <div
                                    class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
                                    <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg"
                                        viewBox="0 0 20 20">
                                        <path
                                            d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z" />
                                    </svg>
                                </div>
                            </div>
                        </div>

                        <div class="pt-4 border-t border-gray-100 flex items-center justify-end space-x-3">
                            <a th:href="@{/users}"
                                class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 hover:bg-gray-50 rounded-lg transition-colors">
                                Cancel
                            </a>
                            <button type="submit"
                                class="px-5 py-2 text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg transition-colors shadow-sm">
                                Apply Structural Modification
                            </button>
                        </div>
                    </form>
                </div>
            </main>
        </div>
    </div>

</body>

</html>
