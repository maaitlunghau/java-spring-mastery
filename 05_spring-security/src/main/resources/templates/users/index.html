<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User List System</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 font-sans text-gray-900">

    <div id="toast"
        class="fixed bottom-5 right-5 z-50 transform translate-y-[100px] opacity-0 transition-all duration-500 ease-out">
        <div class="bg-emerald-600 text-white px-5 py-3 rounded-xl shadow-xl flex items-center space-x-3">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            </svg>
            <span id="toast-message" class="text-sm font-medium">Action successfully processed!</span>
        </div>
    </div>

    <div class="flex h-screen overflow-hidden">
        <div class="w-64 bg-gray-900 text-white flex flex-col">
            <div class="h-16 flex items-center px-6 border-b border-gray-800">
                <span class="text-lg font-bold tracking-wider text-indigo-400">MST SOFTWARE</span>
            </div>
            <nav class="flex-1 px-4 py-6 space-y-1">
                <a th:href="@{/}"
                    class="flex items-center px-4 py-2.5 text-sm font-medium text-gray-400 hover:bg-gray-800 hover:text-white rounded-lg transition-colors">
                    Dashboard
                </a>
                <a th:href="@{/products}"
                    class="flex items-center px-4 py-2.5 text-sm font-medium text-gray-400 hover:bg-gray-800 hover:text-white rounded-lg transition-colors">
                    Products System
                </a>
                <a th:href="@{/users}"
                    class="flex items-center px-4 py-2.5 text-sm font-medium bg-gray-800 text-white rounded-lg">
                    Users System
                </a>
            </nav>
        </div>

        <div class="flex-1 flex flex-col overflow-y-auto">
            <header th:replace="~{layout/header :: header('Users Console')}"></header>
            
            <!-- Page Specific Actions (Optional: Keep the Add button outside or in a sub-header) -->
            <div class="px-8 pt-6 flex justify-end">
                <a th:href="@{/user/create}"
                   class="inline-flex items-center justify-center px-4 py-2 text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg transition-colors shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20">
                    Add User +
                </a>
            </div>


            <main class="p-8 max-w-7xl w-full mx-auto">
                <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-5 mb-6">
                    <form th:action="@{/users}" method="GET" class="flex items-center space-x-3">
                        <div class="relative w-80">
                            <input type="text" name="keyword" th:value="${keyword}"
                                placeholder="Search user name or email..."
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-colors">
                        </div>
                        <button type="submit"
                            class="px-5 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium rounded-lg transition-colors shadow-sm">
                            Search
                        </button>
                        <a th:href="@{/users}"
                            class="px-5 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm font-medium rounded-lg transition-colors">
                            Reset
                        </a>
                    </form>
                </div>

                <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr
                                    class="bg-gray-50 border-b border-gray-200 text-xs font-semibold text-gray-500 uppercase tracking-wider">
                                    <th class="px-6 py-4">ID</th>
                                    <th class="px-6 py-4">Full Name</th>
                                    <th class="px-6 py-4">Email Address</th>
                                    <th class="px-6 py-4">Role</th>
                                    <th class="px-6 py-4">Address</th>
                                    <th class="px-6 py-4 text-right">Actions</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-100 text-sm">
                                <tr th:each="u : ${users}" class="hover:bg-gray-50 transition-colors">
                                    <td class="px-6 py-4 font-mono text-gray-400" th:text="${u.id}">1</td>
                                    <td class="px-6 py-4 font-medium text-gray-900" th:text="${u.name}">John Doe</td>
                                    <td class="px-6 py-4 text-gray-600" th:text="${u.email}">john@example.com</td>
                                    <td class="px-6 py-4 text-gray-600" th:text="${u.role}">ROLE_USER</td>
                                    <td class="px-6 py-4 text-gray-600" th:text="${u.address}">Viet Nam</td>
                                    <td class="px-6 py-4 text-right space-x-3">
                                        <a th:href="@{/user/update/{id}(id=${u.id})}"
                                            class="text-indigo-600 hover:text-indigo-900 font-medium transition-colors">Edit</a>
                                        <form th:action="@{/user/delete/{id}(id=${u.id})}" method="POST"
                                            class="inline-block"
                                            onsubmit="return confirmAction(event, 'Are you sure you want to delete this user?');">
                                            <button type="submit"
                                                class="text-red-600 hover:text-red-900 font-medium transition-colors">Delete</button>
                                        </form>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(users)}">
                                    <td colspan="5" class="px-6 py-12 text-center text-gray-400 italic">No users
                                        registered in the database system.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="px-6 py-4 bg-gray-50 border-t border-gray-200 flex items-center justify-between"
                        th:if="${totalPages > 0}">
                        <span class="text-xs text-gray-500">
                            Showing Page <strong th:text="${currentPage + 1}">1</strong> of <strong
                                th:text="${totalPages}">1</strong>
                            (<span th:text="${totalItems}">0</span> total users)
                        </span>

                        <div class="inline-flex space-x-1">
                            <a th:href="@{/users(keyword=${keyword}, page=${currentPage - 1}, size=${size})}"
                                th:class="${currentPage == 0} ? 'pointer-events-none opacity-50 px-3 py-1.5 border border-gray-300 text-xs font-medium rounded bg-white text-gray-400' : 'px-3 py-1.5 border border-gray-300 text-xs font-medium rounded bg-white text-gray-700 hover:bg-gray-50 transition-colors'">
                                Previous
                            </a>

                            <span th:if="${totalPages > 1}" th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
                                <a th:href="@{/users(keyword=${keyword}, page=${i}, size=${size})}" th:text="${i + 1}"
                                    th:class="${currentPage == i} ? 'px-3 py-1.5 border border-indigo-600 bg-indigo-600 text-white text-xs font-medium rounded' : 'px-3 py-1.5 border border-gray-300 bg-white text-gray-700 hover:bg-gray-50 text-xs font-medium rounded transition-colors'">
                                </a>
                            </span>

                            <a th:href="@{/users(keyword=${keyword}, page=${currentPage + 1}, size=${size})}"
                                th:class="${currentPage + 1 == totalPages} ? 'pointer-events-none opacity-50 px-3 py-1.5 border border-gray-300 text-xs font-medium rounded bg-white text-gray-400' : 'px-3 py-1.5 border border-gray-300 text-xs font-medium rounded bg-white text-gray-700 hover:bg-gray-50 transition-colors'">
                                Next
                            </a>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script th:inline="javascript">
        function confirmAction(event, message) {
            if (!confirm(message)) {
                event.preventDefault();
                return false;
            }
            localStorage.setItem('toast_msg', 'User target directory record core erasure completed.');
            return true;
        }

        window.addEventListener('DOMContentLoaded', () => {
            const storedMsg = localStorage.getItem('toast_msg');
            if (storedMsg) {
                const toast = document.getElementById('toast');
                document.getElementById('toast-message').innerText = storedMsg;

                toast.classList.remove('translate-y-[100px]', 'opacity-0');
                toast.classList.add('translate-y-0', 'opacity-100');

                localStorage.removeItem('toast_msg');

                setTimeout(() => {
                    toast.classList.remove('translate-y-0', 'opacity-100');
                    toast.classList.add('translate-y-[100px]', 'opacity-0');
                }, 3000);
            }
        });
    </script>
</body>

</html>
