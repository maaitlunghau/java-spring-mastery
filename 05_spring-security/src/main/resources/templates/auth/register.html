<!DOCTYPE html>
<html>

<head>
  <title>Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
<div style="padding: 15px;">
  <div>
    <div>
      <main>
        <div class="container">
          <div class="row justify-content-center">
            <div class="col-lg-5">
              <div class="card shadow-lg border-0 rounded-lg mt-5">
                <div class="card-header">
                  <h3 class="text-center font-weight-light my-4">Register</h3>
                </div>
                <div class="card-body">
                  <form method="post" th:action="@{/register}" th:object="${user}">
                    <div class="form-floating mb-3">
                      <input class="form-control" type="text" th:field="*{name}"
                             placeholder=''
                             th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'" />
                      <label>Fullname</label>
                      <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}"
                           class="invalid-feedback" />
                    </div>

                    <div class="form-floating mb-3">
                      <input class="form-control" type="text" th:field="*{address}"
                             placeholder=''
                             th:classappend="${#fields.hasErrors('address')} ? 'is-invalid'" />
                      <label>Address</label>
                      <div th:if="${#fields.hasErrors('address')}" th:errors="*{address}"
                           class="invalid-feedback" />
                    </div>

                    <div class="form-floating mb-3">
                      <input class="form-control" type="email" placeholder=""
                             th:field="*{email}"
                             th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'" />
                      <label>Email</label>
                      <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}"
                           class="invalid-feedback" />
                    </div>
                    <div class="form-floating mb-3">
                      <input class="form-control" type="password" placeholder=""
                             th:field="*{password}"
                             th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'" />
                      <label>Password</label>
                      <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}"
                           class="invalid-feedback" />
                    </div>

                    <div class="mt-4 mb-0">
                      <div class="d-grid">
                        <button class="btn btn-primary btn-block">
                          Register
                        </button>
                      </div>
                    </div>
                  </form>
                </div>
                <div class="card-footer text-center py-3">
                  <div class="small"><a href="/login">Have an account? Go to login.</a>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
