<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title>Header Fragment</title>
</head>

<body>
    <!-- Fragment Header cho Tailwind UI -->
    <header th:fragment="header(title)"
        class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-8 sticky top-0 z-10 font-sans">
        <div class="flex items-center">
            <h1 class="text-xl font-semibold text-gray-800" th:text="${title}">System Management Console</h1>
        </div>

        <div class="flex items-center space-x-6">
            <!-- Hiển thị tin nhắn chào mừng khi đã đăng nhập -->
            <div sec:authorize="isAuthenticated()" class="flex items-center space-x-3">
                <div class="flex flex-col items-end">
                    <span class="text-[10px] uppercase tracking-wider text-gray-400 font-bold leading-tight">Identity Profile</span>
                    <span class="text-sm font-bold text-indigo-600 leading-tight" sec:authentication="name">User Name</span>
                </div>
                <div class="h-9 w-9 rounded-full bg-indigo-50 flex items-center justify-center border border-indigo-100 shadow-sm transition-transform hover:scale-105">
                    <span class="text-xs font-bold text-indigo-600"
                        th:text="${#authentication.name.substring(0,1).toUpperCase()}">U</span>
                </div>
            </div>

            <!-- Phân vùng Nút Login / Logout -->
            <div class="flex items-center border-l border-gray-200 pl-6 space-x-3">
                <div sec:authorize="!isAuthenticated()">
                    <a th:href="@{/login}"
                        class="px-5 py-2 text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg transition-all shadow-sm active:scale-95">
                        Sign In
                    </a>
                </div>

                <div sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post" class="inline">
                        <button type="submit"
                            class="px-5 py-2 text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 border border-gray-300 rounded-lg transition-all shadow-sm active:scale-95">
                            Logout
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </header>
</body>

</html>
